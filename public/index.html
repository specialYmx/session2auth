<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAI Session OAuth 转换器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>
    <div class="page">
      <header class="hero">
        <div class="hero-kicker">OpenAI Token Workbench</div>
        <h1>Session 直出或 OAuth 换 Token</h1>
        <p>
          粘贴 Session，直接导出 JSON，或登录后粘贴回调 URL / <code>code</code> 换取 token。
        </p>
      </header>

      <main class="grid">
        <section class="panel">
          <div class="panel-inner">
            <div class="section">
              <h2>Session</h2>
              <label for="sessionInput">
                支持单个 JSON 对象或单条账号记录。
              </label>
              <textarea
                id="sessionInput"
                placeholder='示例：{"email":"demo@example.com","access_token":"session-token"}'
              ></textarea>
            </div>

            <div class="section">
              <div class="button-row button-row-2">
                <button id="clearBtn" class="danger" type="button">
                  清空
                </button>
                <button id="parseSessionBtn" class="secondary" type="button">
                  生成 JSON
                </button>
              </div>
            </div>

            <div class="section">
              <h2>OAuth（获取refresh_token）</h2>
              <p class="hint">
                生成链接后登录，再把完整回调 URL 或 <code>code</code> 粘贴回来。
              </p>

              <div class="button-row button-row-2">
                <button id="generateLinkBtn" type="button">
                  生成 OAuth 登录链接
                </button>
                <button id="openLinkBtn" class="secondary" type="button">
                  打开登录页
                </button>
              </div>

              <div class="section compact-top">
                <label for="oauthLink">生成的 OAuth URL</label>
                <textarea
                  id="oauthLink"
                  readonly
                  placeholder="OAuth URL 会显示在这里。"
                ></textarea>
              </div>

              <div>
                <label for="oauthCode">回调 URL / OAuth Code</label>
                <input
                  id="oauthCode"
                  type="text"
                  placeholder="直接粘贴完整回调 URL，或只粘贴 code"
                />
              </div>

              <div class="section compact-top">
                <div class="button-row">
                  <button id="exchangeBtn" type="button">
                    生成（含 refresh_token）
                  </button>
                </div>
              </div>
            </div>

            <div class="section">
              <h2>状态</h2>
              <div id="status" class="status"></div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-inner">
            <div class="section">
              <h2>输出格式</h2>
              <div class="pill-row pill-row-4">
                <button class="pill active" data-format="cockpit" type="button">
                  Cockpit
                </button>
                <button class="pill" data-format="cpa" type="button">
                  CPA
                </button>
                <button class="pill" data-format="sub2api" type="button">
                  Sub2API
                </button>
                <button class="pill" data-format="9router" type="button">
                  9router
                </button>
              </div>
            </div>

            <div class="section">
              <div class="button-row button-row-2">
                <button id="copyBtn" class="secondary" type="button">
                  复制输出
                </button>
                <button id="downloadBtn" type="button">
                  下载 JSON
                </button>
              </div>
            </div>

            <div class="section">
              <label for="outputJson">输出 JSON</label>
              <textarea
                id="outputJson"
                class="output-box"
                readonly
                wrap="off"
                placeholder="转换后的 JSON 会显示在这里。"
              ></textarea>
            </div>

            <div class="section">
              <h3>输出记录</h3>
              <div id="accountList" class="account-list"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const state = {
        oauthConfig: null,
        currentFormat: "cockpit",
        basePath: "",
        codeVerifier: "",
        codeChallenge: "",
        oauthLink: "",
        sessions: [],
        accounts: []
      };

      const el = {
        sessionInput: document.getElementById("sessionInput"),
        oauthLink: document.getElementById("oauthLink"),
        oauthCode: document.getElementById("oauthCode"),
        outputJson: document.getElementById("outputJson"),
        status: document.getElementById("status"),
        accountList: document.getElementById("accountList"),
        toastStack: document.getElementById("toastStack")
      };

      function setStatus(message, isError = false) {
        el.status.textContent = message;
        el.status.style.color = isError ? "var(--danger)" : "var(--muted)";
        showToast(message, isError ? "error" : "info");
      }

      function showToast(message, tone = "info") {
        const toast = document.createElement("div");
        toast.className = `toast toast-${tone}`;
        toast.textContent = message;
        el.toastStack.appendChild(toast);

        requestAnimationFrame(() => {
          toast.classList.add("visible");
        });

        const removeToast = () => {
          toast.classList.remove("visible");
          window.setTimeout(() => {
            toast.remove();
          }, 180);
        };

        window.setTimeout(removeToast, tone === "error" ? 3000 : 2200);
        toast.addEventListener("click", removeToast, { once: true });
      }

      function safeJsonParse(text) {
        return JSON.parse(text);
      }

      function apiPath(path) {
        if (!path.startsWith("/")) {
          return path;
        }

        return `${state.basePath}${path}`;
      }

      function tryParseSessionInput(text) {
        const trimmed = text.trim();
        if (!trimmed) {
          return [];
        }

        try {
          // First try normal JSON: either a single object or an array.
          const direct = safeJsonParse(trimmed);
          if (Array.isArray(direct)) {
            return direct;
          }
          return [direct];
        } catch (error) {
          throw error;
        }
      }

      function normalizeSessionEntry(entry, index) {
        const email = entry.email || entry.user?.email || "";
        const accessToken =
          entry.access_token ||
          entry.accessToken ||
          entry.session_token ||
          entry.token ||
          "";

        const accountId =
          entry.account_id ||
          entry.accountId ||
          entry.user?.id ||
          entry.sub ||
          "";

        return {
          index,
          raw: entry,
          email,
          access_token: accessToken,
          account_id: accountId
        };
      }

      function setActiveFormat(format) {
        document.querySelectorAll("[data-format]").forEach((pill) => {
          pill.classList.toggle("active", pill.dataset.format === format);
        });
        state.currentFormat = format;
        refreshOutput();
      }

      function getPrimarySession() {
        return state.sessions.find((session) => session.access_token) || null;
      }

      async function loadConfig() {
        const response = await fetch("./config");
        state.oauthConfig = await response.json();
        state.basePath = state.oauthConfig.basePath || "";
      }

      function randomString(length = 64) {
        const bytes = new Uint8Array(length);
        crypto.getRandomValues(bytes);
        return Array.from(bytes, (byte) =>
          "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~"[
            byte % 66
          ]
        ).join("");
      }

      async function sha256Base64Url(input) {
        const data = new TextEncoder().encode(input);
        const digest = await crypto.subtle.digest("SHA-256", data);
        const bytes = Array.from(new Uint8Array(digest));
        const binary = bytes.map((b) => String.fromCharCode(b)).join("");
        return btoa(binary)
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/g, "");
      }

      function buildAuthorizeUrl({ clientId, redirectUri, scope, authorizationUrl }) {
        const stateValue = randomString(48);
        const nonce = randomString(48);
        const url = new URL(authorizationUrl);

        url.searchParams.set("client_id", clientId);
        url.searchParams.set("redirect_uri", redirectUri);
        url.searchParams.set("response_type", "code");
        url.searchParams.set("scope", scope);
        url.searchParams.set("code_challenge", state.codeChallenge);
        url.searchParams.set("code_challenge_method", "S256");
        url.searchParams.set("state", stateValue);
        url.searchParams.set("nonce", nonce);

        return url.toString();
      }

      function parseJwtPayload(token) {
        if (!token || typeof token !== "string") {
          return {};
        }

        const parts = token.split(".");
        if (parts.length < 2) {
          return {};
        }

        try {
          const base64 = parts[1].replace(/-/g, "+").replace(/_/g, "/");
          const padded = base64.padEnd(Math.ceil(base64.length / 4) * 4, "=");
          return JSON.parse(atob(padded));
        } catch (error) {
          return {};
        }
      }

      function toIsoFromSeconds(seconds) {
        if (!seconds || Number.isNaN(Number(seconds))) {
          return "";
        }

        return new Date(Number(seconds) * 1000).toISOString();
      }

      function extractCodeFromInput(value) {
        const trimmed = String(value || "").trim();
        if (!trimmed) {
          return "";
        }

        if (/^https?:\/\//i.test(trimmed)) {
          try {
            const url = new URL(trimmed);
            return url.searchParams.get("code") || "";
          } catch (error) {
            return "";
          }
        }

        return trimmed;
      }

      function normalizeSessionAsCockpitRecord(session) {
        const accessPayload = parseJwtPayload(session?.access_token || "");
        const accountId = session?.account_id || accessPayload.sub || "";
        const email = session?.email || accessPayload.email || "";

        return {
          type: "codex",
          id_token: "",
          access_token: session?.access_token || "",
          refresh_token: "",
          account_id: accountId,
          last_refresh: new Date().toISOString(),
          email,
          expired: toIsoFromSeconds(accessPayload.exp),
          source: "session",
          session_index: session?.index
        };
      }

      function toCockpitRecord(tokenData, boundSession) {
        const cockpit = tokenData.cockpit;

        return {
          ...cockpit,
          account_id: cockpit.account_id || boundSession?.account_id || "",
          email: cockpit.email || boundSession?.email || "",
          source: "oauth",
          session_index: boundSession?.index
        };
      }

      function toCockpitExportRecord(record) {
        const { session_index, ...exportRecord } = record;
        return exportRecord;
      }

      function toCpaRecord(record) {
        return {
          type: "openai",
          email: record.email,
          account_id: record.account_id,
          access_token: record.access_token,
          refresh_token: record.refresh_token,
          expired: record.expired,
          last_refresh: record.last_refresh
        };
      }

      function toSub2ApiRecord(record) {
        return {
          provider: "openai",
          mode: "oauth",
          email: record.email,
          account_id: record.account_id,
          token: {
            id_token: record.id_token,
            access_token: record.access_token,
            refresh_token: record.refresh_token,
            expired: record.expired,
            last_refresh: record.last_refresh
          }
        };
      }

      function toNineRouterRecord(record) {
        return {
          platform: "openai",
          auth_type: "oauth",
          account: record.email || record.account_id,
          tokens: {
            id_token: record.id_token,
            access_token: record.access_token,
            refresh_token: record.refresh_token
          },
          metadata: {
            account_id: record.account_id,
            expired: record.expired,
            last_refresh: record.last_refresh
          }
        };
      }

      function buildOutputPayload() {
        switch (state.currentFormat) {
          case "cpa":
            return state.accounts.map(toCpaRecord);
          case "sub2api":
            return state.accounts.map(toSub2ApiRecord);
          case "9router":
            return state.accounts.map(toNineRouterRecord);
          case "cockpit":
          default:
            return state.accounts.map(toCockpitExportRecord);
        }
      }

      function refreshOutput() {
        const payload = buildOutputPayload();
        el.outputJson.value = JSON.stringify(payload, null, 2);
      }

      function renderAccounts() {
        el.accountList.innerHTML = "";

        if (!state.accounts.length) {
          el.accountList.innerHTML =
            '<div class="tiny">还没有可导出的账号记录。</div>';
          refreshOutput();
          return;
        }

        state.accounts.forEach((account, index) => {
          const card = document.createElement("div");
          card.className = "account-card";
          card.innerHTML = `
            <strong>账号 #${index}</strong>
            <div class="tiny">来源：${account.source === "session" ? "Session 默认生成" : "OAuth 含 refresh_token"}</div>
            <div class="tiny">邮箱：${account.email || "(空)"}</div>
            <div class="tiny">account_id：${account.account_id || "(空)"}</div>
            <code>refresh_token：${account.refresh_token || "(空)"}</code>
          `;
          el.accountList.appendChild(card);
        });

        refreshOutput();
      }

      async function parseSessions() {
        try {
          const parsed = tryParseSessionInput(el.sessionInput.value);
          state.sessions = parsed.map(normalizeSessionEntry);

          const records = state.sessions
            .filter((session) => session.access_token)
            .map(normalizeSessionAsCockpitRecord);

          state.accounts = records;
          setActiveFormat("cockpit");
          renderAccounts();

          if (!state.sessions.length) {
            setStatus("没有检测到可用的 Session JSON。", true);
            return;
          }

          if (!state.accounts.length) {
            setStatus("Session 已读取，但没有找到可用的 access_token，无法生成 JSON。", true);
            return;
          }

          setStatus(
            `已生成 JSON。当前共 ${state.accounts.length} 条 Session 记录，默认展示 Cockpit，可继续用下方流程补 refresh_token。`
          );
        } catch (error) {
          setStatus(`生成 JSON 失败：${error.message}`, true);
        }
      }

      async function generateOauthLink() {
        try {
          const primarySession = getPrimarySession();

          if (!primarySession) {
            setStatus("请先粘贴 Session 并点击“生成 JSON”，再去获取 refresh_token。", true);
            return;
          }

          if (!state.oauthConfig?.clientId || !state.oauthConfig?.redirectUri) {
            setStatus("服务端缺少 OPENAI_CLIENT_ID 或 OPENAI_REDIRECT_URI 配置。", true);
            return;
          }

          // PKCE values are generated client-side and kept only in browser memory.
          state.codeVerifier = randomString(96);
          state.codeChallenge = await sha256Base64Url(state.codeVerifier);
          state.oauthLink = buildAuthorizeUrl(state.oauthConfig);
          el.oauthLink.value = state.oauthLink;
          setStatus(
            `OAuth 链接已生成。将用于当前第 1 条 Session（${primarySession.email || primarySession.account_id || "未识别账号"}），登录后把完整回调 URL 或 code 粘贴回来即可。`
          );
        } catch (error) {
          setStatus(`生成 OAuth 链接失败：${error.message}`, true);
        }
      }

      async function exchangeCode() {
        try {
          const rawInput = el.oauthCode.value.trim();
          const code = extractCodeFromInput(rawInput);
          const boundSession = getPrimarySession();

          if (!boundSession) {
            setStatus("请先粘贴 Session 并点击“生成 JSON”。", true);
            return;
          }

          if (!code) {
            setStatus("请先粘贴完整回调 URL 或 OAuth code。", true);
            return;
          }

          if (!state.codeVerifier) {
            setStatus("请先生成 OAuth 链接，确保浏览器里已有 PKCE code_verifier。", true);
            return;
          }

          setStatus("正在用 code 换取 tokens...");

          // The backend performs the token exchange so secrets never live in the browser.
          const response = await fetch(apiPath("/exchange"), {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            credentials: "same-origin",
            body: JSON.stringify({
              code,
              code_verifier: state.codeVerifier,
              redirect_uri: state.oauthConfig.redirectUri
            })
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || "Token exchange failed.");
          }

          const record = toCockpitRecord(data, boundSession);
          const existingIndex = state.accounts.findIndex((item) => {
            return item.session_index === record.session_index && record.session_index !== undefined;
          });

          if (existingIndex >= 0) {
            state.accounts.splice(existingIndex, 1, record);
          } else {
            state.accounts.push(record);
          }

          setActiveFormat("cockpit");
          renderAccounts();
          setStatus(`已生成含 refresh_token 的 JSON。当前共 ${state.accounts.length} 条记录。`);
          el.oauthCode.value = "";
        } catch (error) {
          setStatus(`兑换失败：${error.message}`, true);
        }
      }

      async function copyOutput() {
        try {
          if (!el.outputJson.value.trim()) {
            setStatus("当前没有可复制的 JSON，请先生成输出。", true);
            return;
          }

          await navigator.clipboard.writeText(el.outputJson.value);
          setStatus("输出 JSON 已复制。");
        } catch (error) {
          setStatus(`复制失败：${error.message}`, true);
        }
      }

      function downloadOutput() {
        if (!el.outputJson.value.trim()) {
          setStatus("当前没有可下载的 JSON，请先生成输出。", true);
          return;
        }

        // Export whatever the current format tab is rendering.
        const blob = new Blob([el.outputJson.value], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `openai-${state.currentFormat}-export.json`;
        link.click();
        URL.revokeObjectURL(url);
        setStatus("JSON 文件已下载。");
      }

      function clearAll() {
        state.sessions = [];
        state.accounts = [];
        state.codeVerifier = "";
        state.codeChallenge = "";
        state.oauthLink = "";
        el.sessionInput.value = "";
        el.oauthLink.value = "";
        el.oauthCode.value = "";
        renderAccounts();
        setStatus("已清空全部本地数据。");
      }

      function bindFormatSwitching() {
        document.querySelectorAll("[data-format]").forEach((button) => {
          button.addEventListener("click", () => {
            setActiveFormat(button.dataset.format);
            setStatus(`当前输出格式已切换为 ${button.textContent.trim()}。`);
          });
        });
      }

      function bindEvents() {
        document.getElementById("clearBtn").addEventListener("click", clearAll);
        document.getElementById("parseSessionBtn").addEventListener("click", parseSessions);
        document.getElementById("generateLinkBtn").addEventListener("click", generateOauthLink);
        document.getElementById("openLinkBtn").addEventListener("click", () => {
          if (!state.oauthLink) {
            setStatus("请先生成 OAuth 链接。", true);
            return;
          }
          const newWindow = window.open(state.oauthLink, "_blank", "noopener,noreferrer");
          if (!newWindow) {
            setStatus("登录页打开失败，可能被浏览器拦截了弹窗。", true);
            return;
          }
          setStatus("登录页已打开。完成授权后，把回调 URL 或 code 粘贴回来。");
        });
        document.getElementById("exchangeBtn").addEventListener("click", exchangeCode);
        document.getElementById("copyBtn").addEventListener("click", copyOutput);
        document.getElementById("downloadBtn").addEventListener("click", downloadOutput);
      }

      async function init() {
        await loadConfig();
        bindEvents();
        bindFormatSwitching();
        renderAccounts();
        setStatus("已就绪。粘贴 Session 后可直接生成 JSON，默认展示 Cockpit，或继续获取 refresh_token。");
      }

      init().catch((error) => {
        setStatus(`初始化失败：${error.message}`, true);
      });
    </script>
  </body>
</html>
